<div id="root"></div>
<script type="text/babel">
const { useState } = React;

// ══════════════════════════════════════════════════════════════
// F1R3INK — Branded Prototype (Static Mockup)

function Avatar({src, size=48}) {
  return <img src={src} alt="" style={{width:size, height:size, borderRadius:"50%", objectFit:"cover", border:`2px solid ${BRAND.border}`, flexShrink:0}} />;

function AIIcon({size=14, color=BRAND.sky}) {
  return (<svg width={size} height={size} viewBox="0 0 16 16" fill="none">
    <rect x="3" y="3" width="10" height="10" rx="2" stroke={color} strokeWidth="1.3" fill="none"/>
    <circle cx="6.5" cy="7.5" r="1" fill={color}/><circle cx="9.5" cy="7.5" r="1" fill={color}/>

// HOW THIS WORKS button — neutral dark, NOT gradient (avoids competing with JOIN)
function HowBtn({onClick}) {
  return <button onClick={onClick} style={{background:"#000", border:`1px solid ${BRAND.border}`, color:"#fff", borderRadius:20, padding:"12px 24px 8px", fontSize:16, cursor:"pointer", fontFamily:FH, letterSpacing:2, fontWeight:400, display:"inline-flex", alignItems:"center", justifyContent:"center", lineHeight:1, minHeight:38, whiteSpace:"nowrap"}}>HOW THIS WORKS</button>;
}

// Tour overlay
function TourOverlay({onClose}) {
  const slides = [
    { title:"INK IS FEELING\nMADE VISIBLE", body:"Choose a color. Send it to someone. That's an ink — a non-verbal signal that says something words can't. Not a like. Not a vote. A feeling." },
    { title:"YOUR F1R3SIGN TRAVELS\nWITH YOU", body:"Your F1R3Sign isn't locked to this game. It moves with you across every service built on F1R3FLY. One sign, one reputation, everywhere." },
    { title:"YOUR FLAG\nTELLS YOUR STORY", body:"Every ink you receive becomes a stripe on your flag. Over time, your flag becomes a portrait painted by your community — not by you." },
    { title:"BUILT ON\nF1R3FLY", body:"F1R3INK runs on F1R3FLY's shared computing layer. Every ink is a real transaction on a real shard. No central server. No single point of failure." }
  ];
  const [si, setSi] = useState(0);
  const s = slides[si];
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FH}} onClick={onClose}>
      <style>{`@keyframes tourIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}`}</style>
      <div onClick={e=>e.stopPropagation()} style={{maxWidth:480,width:"90%",padding:"48px 40px",border:`1px dashed ${BRAND.sky}66`,borderRadius:14,background:"#000",animation:"tourIn 0.3s ease-out",textAlign:"center"}}>
        <h2 style={{fontSize:20,fontWeight:700,letterSpacing:4,fontFamily:FH,color:BRAND.yellow,lineHeight:1.5,whiteSpace:"pre-line",margin:"0 0 20px"}}>{s.title}</h2>
        <p style={{fontSize:17,color:"#fff",lineHeight:1.6,fontFamily:FB,margin:0}}>{s.body}</p>
        <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:32}}>
          {slides.map((_,i)=><div key={i} onClick={()=>setSi(i)} style={{width:10,height:10,borderRadius:"50%",background:i===si?BRAND.yellow:"rgba(255,255,255,0.2)",cursor:"pointer"}} />)}
        </div>
        <div style={{marginTop:24}}>
          {si < slides.length-1
            ? <button onClick={()=>setSi(si+1)} style={{background:"#000",border:`1px solid ${BRAND.border}`,color:"#fff",borderRadius:20,padding:"12px 28px 8px",fontSize:16,fontFamily:FH,fontWeight:600,cursor:"pointer",letterSpacing:2,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38,whiteSpace:"nowrap"}}>NEXT</button>
            : <button onClick={onClose} style={{background:"#000",border:`1px solid ${BRAND.border}`,color:"#fff",borderRadius:20,padding:"12px 28px 8px",fontSize:16,fontFamily:FH,fontWeight:600,cursor:"pointer",letterSpacing:2,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38,whiteSpace:"nowrap"}}>LET'S GO</button>}
        </div>
      </div>
    </div>
  );
}

// ── F1R3INK lockup ────────────────────────────────────────────
// External SVG: images/f1r3ink-logo.svg (viewBox 3696.77 × 939.08, ratio ~3.94:1)
function InkLogo({height=72}) {
  return <img src="images/f1r3ink-logo.svg" alt="F1R3Ink" style={{height,display:"block"}}/>;
}

// ── Main App ──────────────────────────────────────────────────
function F1R3Ink() {
  const [phase, setPhase] = useState("join");
  const [myName, setMyName] = useState("");
  const [myTags, setMyTags] = useState("");
  const [showTour, setShowTour] = useState(false);
  const [selectedTarget, setSelectedTarget] = useState(null);
  const [selectedColor, setSelectedColor] = useState(null);

  // ── JOIN SCREEN ──────────────────────────────────────────
  if (phase === "join") return (
    <div style={{height:"100vh",overflow:"hidden",background:"#000",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",fontFamily:FH,position:"relative"}}>
      <style>{FONTS}{`@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}} input:focus{border-color:${BRAND.sky}66 !important;outline:none} input::placeholder, textarea::placeholder { color: ${BRAND.textSecondary}; opacity: 1; }`}</style>
      <div style={{animation:"fadeIn .6s ease-out",textAlign:"center",marginTop:-75,position:"relative",zIndex:1}}>
        <F1R3GamesLogo width={196}/>
        <div style={{fontSize:16,color:"#fff",letterSpacing:6,fontFamily:FH,fontWeight:400,marginTop:24}}>PRESENTS</div>
        <div style={{height:40}}/>
        <div style={{border:`1px dashed ${BRAND.sky}66`,borderRadius:14,padding:"40px 48px",display:"inline-block",background:"#000"}}>
          <h1 style={{margin:"0 0 12px",display:"flex",alignItems:"center",justifyContent:"center"}}><InkLogo height={74}/></h1>
          <div style={{fontSize:16,color:"#fff",letterSpacing:4,fontWeight:400,fontFamily:FH,lineHeight:1.6}}>YOUR TRUE COLORS<br/>COME SHINING THROUGH</div>
        </div>
        <div style={{height:50}}/>
        <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
          <div style={{fontSize:16,color:BRAND.yellow,letterSpacing:4,fontWeight:700,fontFamily:FH}}>CHOOSE YOUR F1R3SIGN</div>
          <input value={myName} onChange={e=>setMyName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&myName.trim()&&setPhase("play")} placeholder="someone colorful" style={{background:"#000",border:`1px dashed ${BRAND.sky}66`,borderRadius:6,color:"#fff",padding:"10px 16px",fontSize:16,fontWeight:300,width:"100%",maxWidth:460,fontFamily:FH,textAlign:"center",outline:"none",marginTop:20}}/>
          <input value={myTags} onChange={e=>setMyTags(e.target.value)} placeholder="tags: mood, vibe, role..." style={{background:"#000",border:`1px dashed ${BRAND.sky}66`,borderRadius:6,color:"#fff",padding:"10px 16px",fontSize:16,width:"100%",maxWidth:460,fontFamily:FH,textAlign:"center",outline:"none"}}/>
          <button onClick={()=>myName.trim()&&setPhase("play")} style={{background:"linear-gradient(135deg, #5c0269, #7b0429)",color:"#fff",border:"none",borderRadius:20,padding:"12px 32px 8px",fontSize:16,fontFamily:FH,fontWeight:600,cursor:"pointer",letterSpacing:3,boxShadow:"0 0 20px rgba(123,4,41,0.4)",marginTop:20,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38,whiteSpace:"nowrap"}}>JOIN</button>
          <div style={{fontSize:16,color:"#fff",letterSpacing:4,fontWeight:400,fontFamily:FH,lineHeight:2.2,marginTop:20}}>YOUR F1R3SIGN TRAVELS<br/>WITH YOU ACROSS F1R3FLY</div>
          <div style={{marginTop:12}}><HowBtn onClick={()=>setShowTour(true)}/></div>
        </div>
        {DEMO_PLAYERS.length > 0 && <div style={{marginTop:16,color:BRAND.textDim,fontSize:16}}>{DEMO_PLAYERS.length} playing</div>}
      </div>
      <BuiltOnBadge/>
      {showTour && <TourOverlay onClose={()=>setShowTour(false)}/>}
    </div>
  );

  // ── GAME VIEW ──────────────────────────────────────────────
  const displayName = myName.trim() || "Hannah";
  const totalInks = DEMO_PLAYERS.reduce((a,p) => a + p.inks.length, 0) + MY_INKS.length;

  return (
    <div style={{minHeight:"100vh",background:"#000",color:"#fff",fontFamily:FH,display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>
      <style>{FONTS}{`::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px} *{box-sizing:border-box} input::placeholder, textarea::placeholder { color: ${BRAND.textSecondary}; opacity: 1; }`}</style>

      {/* Header */}
      <div className="game-header" style={{padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#000",minHeight:70}}>
        <div style={{display:"flex",alignItems:"baseline",gap:12}}>
          <InkLogo height={27}/>
          <span style={{fontSize:16,color:"#fff",letterSpacing:2,fontFamily:FB}}>{DEMO_PLAYERS.length + 1} players | {totalInks} inks | shard live</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <HowBtn onClick={()=>setShowTour(true)}/>
          <button onClick={()=>setPhase("join")} style={{background:"#000",border:`1px solid ${BRAND.border}`,color:"#fff",borderRadius:20,padding:"10px 18px 8px",fontSize:16,cursor:"pointer",fontFamily:FH,letterSpacing:1,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38,whiteSpace:"nowrap"}}>LEAVE</button>
        </div>
      </div>

      {/* Gradient stroke */}
      <div style={{width:"100%",height:"0.5px",background:BRAND.stroke,opacity:0.8}}/>

      {/* 3-column layout */}
      <div className="game-layout" style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* Left Sidebar — My Flag */}
        <div className="game-sidebar game-sidebar-left" style={{width:300,minWidth:300,flexShrink:0,borderRight:`1px solid ${BRAND.border}`,padding:"20px 16px",display:"flex",flexDirection:"column",gap:20,overflowY:"auto",background:"#000"}}>

          {/* MY FLAG section */}
          <div style={{paddingBottom:20,borderBottom:`1px solid ${BRAND.border}`,display:"flex",flexDirection:"column",gap:12,alignItems:"center"}}>
            <div style={{fontSize:16,color:"#fff",letterSpacing:2,fontFamily:FH,textTransform:"uppercase",alignSelf:"flex-start"}}>MY FLAG</div>
            <Avatar src={PORTRAITS.hannah} size={80}/>
            <div style={{fontSize:16,color:BRAND.yellow,fontWeight:600,fontFamily:FB}}>{displayName}</div>
            <div style={{width:"100%"}}>
              <div style={{fontSize:16,color:"#fff",marginBottom:8,letterSpacing:2,fontFamily:FH,textTransform:"uppercase"}}>TAGS</div>
              <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                {(myTags.trim() ? myTags.split(",").map(t=>t.trim()).filter(Boolean) : ["Pooh"]).map((t,i) =>
                  <span key={i} style={{background:BRAND.card,border:`1px solid ${BRAND.border}`,borderRadius:20,padding:"2px 12px",fontSize:16,color:BRAND.sage,fontFamily:FB}}>{t}</span>
                )}
              </div>
            </div>
          </div>

          {/* F1R3 SIGNALS section */}
          <div style={{paddingBottom:20,borderBottom:`1px solid ${BRAND.border}`,display:"flex",flexDirection:"column",gap:12}}>
            <div style={{fontSize:16,color:"#fff",letterSpacing:2,fontFamily:FH,textTransform:"uppercase"}}>F1R3 SIGNALS</div>
            <div style={{fontSize:16,color:BRAND.sky,fontFamily:FB,lineHeight:1.4}}>Not a &quot;like&quot; button — a feeling</div>
            {selectedTarget
              ? <div style={{fontSize:16,color:"#fff",fontFamily:FB}}>How do you feel about <span style={{color:BRAND.yellow,fontWeight:600}}>{DEMO_PLAYERS.find(p=>p.id===selectedTarget)?.name}</span>?</div>
              : <div style={{fontSize:16,color:BRAND.textSecondary,fontFamily:FB}}>select someone to ink</div>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(6, 1fr)",gap:"10px 6px",justifyItems:"center"}}>
              {INK_COLORS.map(c => (
                <div key={c.hex} title={c.name} onClick={()=>setSelectedColor(c.hex)} style={{width:24,height:24,borderRadius:"50%",background:c.hex,cursor:"pointer",border:selectedColor===c.hex?"2px solid #fff":`1px solid ${BRAND.border}`,transition:"transform 0.15s",transform:selectedColor===c.hex?"scale(1.3)":"scale(1)"}}/>
              ))}
            </div>
            {selectedColor && selectedTarget && (
              <div style={{textAlign:"center",marginTop:4}}>
                <button style={{background:selectedColor,color:(selectedColor==="#F3D630"||selectedColor==="#FFFFFF"||selectedColor==="#7A9D0E")?"#111":"#fff",border:"none",borderRadius:20,padding:"12px 32px 8px",fontSize:16,fontFamily:FH,fontWeight:600,cursor:"pointer",letterSpacing:3,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38,whiteSpace:"nowrap",boxShadow:`0 0 20px ${selectedColor}44`}}>INK</button>
              </div>
            )}
            <div style={{fontSize:16,color:BRAND.textSecondary,fontFamily:FB}}>How does this F1R3INK make you feel?</div>
          </div>

          {/* INKED BY section */}
          <div style={{display:"flex",flexDirection:"column",gap:12}}>
            <div style={{fontSize:16,color:"#fff",letterSpacing:2,fontFamily:FH,textTransform:"uppercase"}}>INKED BY</div>
            {MY_INKS.length > 0 ? (
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {MY_INKS.map((s,i) => (
                  <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{width:12,height:12,borderRadius:"50%",background:s.color,flexShrink:0,border:`1px solid ${BRAND.border}`}}/>
                    <span style={{fontSize:16,color:"#fff",fontFamily:FB}}>{s.from}</span>
                  </div>
                ))}
              </div>
            ) : (
              <div style={{color:BRAND.textSecondary,fontSize:16,textAlign:"center",lineHeight:1.6,fontFamily:FB}}>no ink yet<br/><span>others will color your flag</span></div>
            )}
            <div style={{fontSize:16,color:BRAND.textSecondary,fontFamily:FB,marginTop:4}}>powered by F1R3INK</div>
          </div>
        </div>

        {/* Center — Community */}
        <div style={{flex:1,overflowY:"auto",padding:"24px 32px",background:"#000"}}>
          <div style={{fontSize:16,color:"#fff",letterSpacing:2,marginBottom:20,fontFamily:FH,textTransform:"uppercase"}}>COMMUNITY WHEEL</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))",gap:20}}>
            {/* My card */}
            <div style={{padding:20,borderRadius:8,border:`1px solid ${BRAND.border}`,background:"#000",textAlign:"center"}}>
              <Avatar src={PORTRAITS.hannah} size={72}/>
              <div style={{fontSize:16,color:BRAND.yellow,fontWeight:600,marginTop:8,fontFamily:FB}}>{displayName}</div>
              <div style={{display:"flex",gap:3,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
                {MY_INKS.map((ink,i) => <div key={i} style={{width:16,height:16,borderRadius:"50%",background:ink.color}} title={`from ${ink.from}`}/>)}
              </div>
              <div style={{fontSize:16,color:BRAND.textSecondary,marginTop:6,fontFamily:FB}}>{MY_INKS.length} inks</div>
            </div>
            {/* Other players */}
            {DEMO_PLAYERS.map(p => (
              <div key={p.id} onClick={()=>setSelectedTarget(selectedTarget===p.id ? null : p.id)} style={{padding:20,borderRadius:8,border:selectedTarget===p.id?`1px solid ${BRAND.sky}`:`1px solid ${BRAND.border}`,background:selectedTarget===p.id?"rgba(63,169,245,0.06)":"#000",textAlign:"center",cursor:"pointer",transition:"all 0.2s"}}>
                <Avatar src={p.portrait} size={72}/>
                <div style={{fontSize:16,color:selectedTarget===p.id?BRAND.sky:"#fff",fontWeight:600,marginTop:8,fontFamily:FB}}>{p.name}</div>
                <div style={{display:"flex",gap:3,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
                  {p.inks.map((ink,i) => <div key={i} style={{width:16,height:16,borderRadius:"50%",background:ink.color}} title={`from ${ink.from}`}/>)}
                </div>
                <div style={{fontSize:16,color:BRAND.textSecondary,marginTop:6,fontFamily:FB}}>{p.inks.length} ink{p.inks.length!==1?"s":""}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
      <BuiltOnBadge/>
      {showTour && <TourOverlay onClose={()=>setShowTour(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<F1R3Ink/>);
</script>
</body>
</html>
