<!-- Mock shard storage -->
<script>
(function() {
  var store = {};
  window.storage = {
    get: function(key, shared) { var v = store[key]; return v !== undefined ? Promise.resolve({ key: key, value: v, shared: !!shared }) : Promise.resolve(null); },
    set: function(key, value, shared) { store[key] = value; return Promise.resolve({ key: key, value: value, shared: !!shared }); },
    delete: function(key, shared) { delete store[key]; return Promise.resolve({ key: key, deleted: true, shared: !!shared }); },
    list: function(prefix, shared) { var keys = Object.keys(store).filter(function(k) { return !prefix || k.startsWith(prefix); }); return Promise.resolve({ keys: keys, prefix: prefix, shared: !!shared }); }
  };
})();

// ── Sigil (player avatar) ────────────────────────────────────────
function Sigil({seed, size=24}){
  const s=seed%10000, h1=s%360, h2=(s*7+120)%360, r=size*.38;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill={`hsl(${h1},25%,15%)`} stroke={`hsl(${h1},50%,40%)`} strokeWidth="1"/>
      <circle cx={size/2} cy={size/2-r*.3} r={size*.1} fill={`hsl(${h1},70%,65%)`} opacity=".8"/>
      <circle cx={size/2+r*.3} cy={size/2+r*.2} r={size*.08} fill={`hsl(${h2},70%,65%)`} opacity=".7"/>
    </svg>
  );
}

// ── Canvas Shape Selector ────────────────────────────────────────
function ShapeSelector({ selected, onChange }) {
  const shapes = Object.entries(CANVAS_SHAPES);
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12, alignItems: "center" }}>
      <div style={{
        fontSize: 11, color: BRAND.textDim, letterSpacing: 2,
        fontFamily: FONT_HEADING, textTransform: "uppercase",
      }}>
        CANVAS SHAPE
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        {shapes.map(([key, shape]) => {
          const isActive = selected === key;
          // Mini preview proportions
          const previewW = key === "portrait" ? 24 : key === "landscape" ? 36 : 30;
          const previewH = key === "portrait" ? 36 : key === "landscape" ? 24 : 30;
          return (
            <button key={key} onClick={() => onChange(key)} style={{
              background: isActive ? "rgba(243,214,48,0.08)" : "rgba(26,26,48,0.4)",
              border: isActive ? `1px solid ${BRAND.yellow}66` : `1px solid ${BRAND.border}`,
              borderRadius: 8, padding: "12px 16px",
              cursor: "pointer", display: "flex", flexDirection: "column",
              alignItems: "center", gap: 8, minWidth: 80,
              transition: "all 0.15s ease",
            }}>
              {/* Mini grid preview */}
              <div style={{
                width: previewW, height: previewH,
                border: isActive ? `2px solid ${BRAND.yellow}` : `2px solid ${BRAND.textDim}44`,
                borderRadius: 3,
                display: "grid",
                gridTemplateColumns: `repeat(${key === "portrait" ? 4 : key === "landscape" ? 6 : 5}, 1fr)`,
                gridTemplateRows: `repeat(${key === "portrait" ? 6 : key === "landscape" ? 4 : 5}, 1fr)`,
                gap: 1, padding: 1,
                opacity: isActive ? 1 : 0.5,
              }}>
                {Array.from({ length: (key === "portrait" ? 24 : key === "landscape" ? 24 : 25) }, (_, i) => (
                  <div key={i} style={{
                    background: isActive ? `${BRAND.yellow}30` : `${BRAND.textDim}15`,
                    borderRadius: 0.5,
                  }} />
                ))}
              </div>
              <div style={{
                fontSize: 11, fontWeight: 600, letterSpacing: 1.5,
                fontFamily: FONT_HEADING,
                color: isActive ? BRAND.yellow : BRAND.textDim,
              }}>
                {shape.label}
              </div>
              <div style={{
                fontSize: 10, color: isActive ? BRAND.textMuted : BRAND.textDim,
                fontFamily: FONT_MONO,
              }}>
                {shape.desc}
              </div>
            </button>
          );
        })}
      </div>
    </div>
  );
}

        <div className="join-subtitle" style={{ fontSize: 18, color: "#ffffff", letterSpacing: 3, fontWeight: 400 }}>
          COLLECTIVE VISUAL INTELLIGENCE
        </div>

        {/* Canvas shape selector — only shown when creating a new shard */}
        {isNewShard && (
          <div style={{ marginTop: 32 }}>
            <ShapeSelector selected={shardShape} onChange={onShapeChange} />
          </div>
        )}

        {/* If joining an existing shard, show the locked shape */}
        {!isNewShard && (
          <div style={{
            marginTop: 24, padding: "10px 20px",
            border: `1px solid ${BRAND.border}`, borderRadius: 6,
            display: "inline-flex", alignItems: "center", gap: 10,
          }}>
            <span style={{ fontSize: 11, color: BRAND.textDim, letterSpacing: 1.5, fontFamily: FONT_HEADING }}>
              CANVAS:
            </span>
            <span style={{ fontSize: 13, color: BRAND.yellow, letterSpacing: 1.5, fontFamily: FONT_HEADING, fontWeight: 600 }}>
              {CANVAS_SHAPES[shardShape]?.label}
            </span>
            <span style={{ fontSize: 11, color: BRAND.textDim, fontFamily: FONT_MONO }}>
              {CANVAS_SHAPES[shardShape]?.desc}
            </span>
            <span style={{
              fontSize: 10, color: BRAND.textDim, fontFamily: FONT_BODY,
              padding: "2px 6px", border: `1px solid ${BRAND.border}`, borderRadius: 3,
            }}>
              LOCKED
            </span>
          </div>
        )}

        <div style={{ marginTop: 24, display: "flex", flexDirection: "column", gap: 12, alignItems: "center" }}>
          <input value={name} onChange={e => setName(e.target.value)}
            onKeyDown={e => e.key === "Enter" && go()}
            placeholder="your name"
            style={{
              background: "#111", border: `1px solid ${BRAND.border}`, borderRadius: 6,
              color: "#fff", padding: "10px 16px", fontSize: 16, width: 260,
              fontFamily: FONT_HEADING, textAlign: "center", outline: "none"
            }} />
          <button onClick={go} style={{
            background: "linear-gradient(135deg, #5c0269, #7b0429)", color: "#ffffff",
            border: "none", borderRadius: 6, padding: "10px 32px", fontSize: 16,
            fontFamily: FONT_HEADING, fontWeight: 600, cursor: "pointer",
            letterSpacing: 3, boxShadow: "0 0 20px rgba(123,4,41,0.4)"
          }}>JOIN</button>
        </div>
        {players.length > 0 && (
          <div style={{ marginTop: 24, color: BRAND.textDim, fontSize: 16 }}>
            {players.length} playing
          </div>
        )}
      </div>
      <BuiltOnBadge />
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// MAIN GAME COMPONENT
// ══════════════════════════════════════════════════════════════════
function F1R3Pix() {
  const [phase, setPhase] = useState("loading");
  const [myId, setMyId] = useState(null);
  const [myName, setMyName] = useState("");
  const [players, setPlayers] = useState([]);
  const [canvasShape, setCanvasShape] = useState(DEFAULT_SHAPE);
  const [isNewShard, setIsNewShard] = useState(true);

  // Grid dimensions derived from shape
  const gridW = CANVAS_SHAPES[canvasShape]?.w || CANVAS_SHAPES[DEFAULT_SHAPE].w;
  const gridH = CANVAS_SHAPES[canvasShape]?.h || CANVAS_SHAPES[DEFAULT_SHAPE].h;

  const [grid, setGrid] = useState({});
  const [selColor, setSelColor] = useState(PALETTE[8]); // brand yellow
  const [shardOk, setShardOk] = useState(false);
  const [hoverCell, setHoverCell] = useState(null);
  const [zoom, setZoom] = useState(1);
  const [signal, setSignal] = useState(null);
  const [signalConfirm, setSignalConfirm] = useState(false);
  const pollRef = useRef(null);
  const gridContainerRef = useRef(null);

  // Build empty grid when shape changes
  const buildEmptyGrid = useCallback((w, h) => {
    const g = {};
    for (let y = 0; y < h; y++)
      for (let x = 0; x < w; x++)
        g[`${x},${y}`] = { color: "#1a1a2e", by: null, ts: 0 };
    return g;
  }, []);

  // Initialize grid on shape load
  useEffect(() => {
    setGrid(buildEmptyGrid(gridW, gridH));
  }, [canvasShape, gridW, gridH, buildEmptyGrid]);

  // Simulated players for demo
  const fakeUsers = [
    { id: "sim-claude", name: "Claude", joinedAt: Date.now() - 300000 },
    { id: "sim-gemini", name: "Gemini", joinedAt: Date.now() - 240000 },
    { id: "sim-grok", name: "Grok", joinedAt: Date.now() - 180000 },
    { id: "sim-llama", name: "Llama", joinedAt: Date.now() - 120000 },
    { id: "sim-scarlet", name: "Scarlet", joinedAt: Date.now() - 60000 },
  ];
  const allPlayers = [...players, ...fakeUsers];

  // ── Data loading ─────────────────────────────────────────────
  const loadPlayers = useCallback(async () => {
    const keys = await sh.list(PFX_P); const all = [];
    for (const k of keys) { const p = await sh.get(k); if (p) all.push(p); }
    setPlayers(all); return all;
  }, []);

  const loadGrid = useCallback(async () => {
    const keys = await sh.list(PFX_PX);
    setGrid(prev => {
      const g = { ...prev };
      (async () => {
        for (const k of keys) { const px = await sh.get(k); if (px) g[`${px.x},${px.y}`] = px; }
        setGrid({ ...g });
      })();
      return g;
    });
  }, []);

  const syncAll = useCallback(async () => {
    try { await loadPlayers(); await loadGrid(); setShardOk(true); }
    catch { setShardOk(false); }
  }, [loadPlayers, loadGrid]);

  // ── Init: check for existing session & shard shape ──────────
  useEffect(() => { (async () => {
    // Check if a canvas shape is already set on this shard
    const existingShape = await sh.get(SHARD_SHAPE);
    if (existingShape && CANVAS_SHAPES[existingShape]) {
      setCanvasShape(existingShape);
      setIsNewShard(false);
    } else {
      setIsNewShard(true);
    }

    // Check for existing session
    const sid = await sh.get(MY_ID, false);
    if (sid) {
      const p = await sh.get(`${PFX_P}${sid}`);
      if (p) { setMyId(sid); setMyName(p.name); await syncAll(); setPhase("play"); return; }
    }
    await loadPlayers(); setPhase("join");
  })() }, []);

  useEffect(() => {
    if (phase !== "play") return;
    pollRef.current = setInterval(syncAll, POLL);
    return () => clearInterval(pollRef.current);
  }, [phase, syncAll]);

  // ── Actions ──────────────────────────────────────────────────
  const handleJoin = async (name) => {
    // Lock the canvas shape to the shard on first join (if new shard)
    if (isNewShard) {
      await sh.set(SHARD_SHAPE, canvasShape);
      setIsNewShard(false);
    }

    const id = `px-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,6)}`;
    await sh.set(`${PFX_P}${id}`, { id, name, joinedAt: Date.now() });
    await sh.set(MY_ID, id, false);
    setMyId(id); setMyName(name); await syncAll(); setPhase("play");
  };

  const placePixel = async (x, y) => {
    if (!myId) return;
    const px = { x, y, color: selColor, by: myId, byName: myName, ts: Date.now() };
    await sh.set(`${PFX_PX}${x}-${y}`, px);
    setGrid(prev => ({ ...prev, [`${x},${y}`]: px }));
  };

  const leave = async () => {
    if (myId) { await sh.del(`${PFX_P}${myId}`); await sh.set(MY_ID, null, false); }
    setMyId(null); setPhase("join"); await loadPlayers();
  };

  // ── Zoom handler (scroll wheel — snaps to 10%) ───────────────
  const handleWheel = useCallback((e) => {
    e.preventDefault();
    setZoom(z => {
      const step = 0.1;
      const next = e.deltaY > 0 ? z - step : z + step;
      const snapped = Math.round(next * 10) / 10;
      return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, snapped));
    });
  }, []);

  useEffect(() => {
    const el = gridContainerRef.current;
    if (!el) return;
    el.addEventListener("wheel", handleWheel, { passive: false });
    return () => el.removeEventListener("wheel", handleWheel);
  }, [handleWheel, phase]);

  // ── Calculate initial zoom to fit screen ─────────────────────
  useEffect(() => {
    if (phase !== "play") return;
    const sidebarW = window.innerWidth > 768 ? 200 : 0;
    const vw = window.innerWidth - sidebarW;
    const vh = window.innerHeight - (window.innerWidth > 768 ? 90 : 70);
    if (window.innerWidth <= 768) {
      const mobileGridH = window.innerHeight * 0.55;
      const gridPxW = gridW * (CELL_BASE + 1);
      const gridPxH = gridH * (CELL_BASE + 1);
      const fitZoom = Math.min(vw / gridPxW, mobileGridH / gridPxH, MAX_ZOOM);
      setZoom(Math.max(MIN_ZOOM, Math.round(fitZoom * 10) / 10));
    } else {
      const gridPxW = gridW * (CELL_BASE + 1);
      const gridPxH = gridH * (CELL_BASE + 1);
      const fitZoom = Math.min(vw / gridPxW, vh / gridPxH, MAX_ZOOM);
      setZoom(Math.max(MIN_ZOOM, Math.round(fitZoom * 10) / 10));
    }
  }, [phase, gridW, gridH]);

  const pixelCount = Object.values(grid).filter(p => p.by).length;

  // ── Render: Loading ──────────────────────────────────────────
  if (phase === "loading") return (
    <div style={{ minHeight: "100vh", background: "#000", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <style>{BRAND_FONTS}{`@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}`}</style>
      <div style={{ color: "#fff", fontSize: 16, letterSpacing: 2, fontFamily: FONT_HEADING, animation: "pulse 1.5s ease-in-out infinite" }}>
        connecting to shard...
      </div>
    </div>
  );

  if (phase === "join") return (
    <JoinScreen
      onJoin={handleJoin}
      players={players}
      shardShape={canvasShape}
      onShapeChange={setCanvasShape}
      isNewShard={isNewShard}
    />
  );

  const hovInfo = hoverCell ? grid[hoverCell] : null;
  const shapeInfo = CANVAS_SHAPES[canvasShape];

  // ── Render: Game View ───────────────────────────────────────
  return (
    <div style={{ minHeight: "100vh", background: "#000", color: "#fff", fontFamily: FONT_BODY, display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <style>{BRAND_FONTS}{`
        ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:${BRAND.border};border-radius:2px}
        *{box-sizing:border-box}
      `}</style>

      {/* Header */}
      <div className="game-header" style={{
        padding: "14px 20px", borderBottom: `1px solid ${BRAND.border}`,
        display: "flex", alignItems: "center", justifyContent: "space-between",
        background: "#000", minHeight: 70,
      }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
          <span className="game-header-title" style={{ fontSize: 29, fontWeight: 700, letterSpacing: 4, fontFamily: FONT_HEADING, color: "#fff" }}>
            F1R3<span style={{ color: BRAND.yellow }}>PIX</span>
          </span>
          <span className="game-header-stats" style={{ fontSize: 16, color: "#ccc", letterSpacing: 2, fontFamily: FONT_BODY }}>
            {allPlayers.length} players | {pixelCount} pixels | shard {shardOk ? "live" : "offline"}
          </span>
        </div>
        <div className="zoom-controls" style={{ display: "flex", alignItems: "center", gap: 12 }}>
          <button className="zoom-btn" onClick={() => setZoom(z => Math.max(MIN_ZOOM, Math.round((z - 0.1) * 10) / 10))} style={{
            background: "none", border: `1px solid ${BRAND.border}`, color: "#ccc",
            borderRadius: 4, width: 36, height: 36, fontSize: 22, cursor: "pointer",
            fontFamily: FONT_HEADING, display: "flex", alignItems: "center", justifyContent: "center",
          }}>-</button>
          <span style={{ fontSize: 16, color: BRAND.textMuted, fontFamily: FONT_MONO, minWidth: 50, textAlign: "center" }}>
            {Math.round(zoom * 100)}%
          </span>
          <button onClick={() => setZoom(z => Math.min(MAX_ZOOM, Math.round((z + 0.1) * 10) / 10))} style={{
            background: "none", border: `1px solid ${BRAND.border}`, color: "#ccc",
            borderRadius: 4, width: 36, height: 36, fontSize: 22, cursor: "pointer",
            fontFamily: FONT_HEADING, display: "flex", alignItems: "center", justifyContent: "center",
          }}>+</button>
          <button onClick={leave} style={{
            background: "none", border: `1px solid ${BRAND.border}`, color: "#ccc",
            borderRadius: 4, padding: "4px 10px", fontSize: 16, cursor: "pointer",
            fontFamily: FONT_HEADING, letterSpacing: 1,
          }}>LEAVE</button>
        </div>
      </div>

      {/* Main area: Grid + Sidebar */}
      <div className="game-layout" style={{ flex: 1, display: "flex", overflow: "hidden" }}>

        {/* Grid with zoom */}
        <div ref={gridContainerRef} className="game-grid-wrap" style={{
          flex: 1, display: "flex", alignItems: "center", justifyContent: "center",
          padding: 8, overflow: "auto", background: "#000",
        }}>
          <div style={{
            display: "grid",
            gridTemplateColumns: `repeat(${gridW}, ${CELL_BASE}px)`,
            gap: 1, background: "#0a0a14", padding: 1, borderRadius: 4,
            transform: `scale(${zoom})`,
            transformOrigin: "center center",
            transition: "transform 0.1s ease-out",
          }}>
            {Array.from({ length: gridH }, (_, y) =>
              Array.from({ length: gridW }, (_, x) => {
                const key = `${x},${y}`; const px = grid[key];
                return (
                  <div key={key}
                    onClick={() => placePixel(x, y)}
                    onMouseEnter={() => setHoverCell(key)}
                    onMouseLeave={() => setHoverCell(null)}
                    style={{
                      width: CELL_BASE, height: CELL_BASE,
                      background: px?.color || "#1a1a2e",
                      cursor: "pointer", transition: "background .1s",
                      outline: hoverCell === key ? `2px solid ${selColor}` : "none",
                      outlineOffset: -2, borderRadius: 1,
                    }} />
                );
              })
            )}
          </div>
        </div>

        {/* Sidebar: Palette + Info */}
        <div className="game-sidebar" style={{
          width: 200, borderLeft: `1px solid ${BRAND.border}`,
          padding: "16px 12px", display: "flex", flexDirection: "column", gap: 16,
          overflowY: "auto", background: "#000",
        }}>
          <div style={{ fontSize: 16, color: BRAND.textMuted, letterSpacing: 2, fontFamily: FONT_HEADING }}>PALETTE</div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 4 }}>
            {PALETTE.map(c => (
              <div key={c} onClick={() => setSelColor(c)}
                style={{
                  width: 28, height: 28, borderRadius: 4, background: c, cursor: "pointer",
                  border: selColor === c ? "2px solid #fff" : c === "#000000" ? "1px solid #333" : "1px solid transparent",
                  transition: "transform .1s",
                  transform: selColor === c ? "scale(1.15)" : "scale(1)",
                }} />
            ))}
          </div>

          <div style={{ fontSize: 16, color: BRAND.textMuted, letterSpacing: 2, fontFamily: FONT_HEADING }}>ACTIVE</div>
          <div style={{ fontSize: 16, color: "#ccc", fontFamily: FONT_BODY }}>
            Selected: <span style={{ color: selColor, fontWeight: 600 }}>{selColor}</span>
          </div>

          {hovInfo?.by && (
            <div style={{ fontSize: 16, color: "#ccc", fontFamily: FONT_BODY }}>
              by: {hovInfo.byName || "?"}<br />
              {new Date(hovInfo.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}
            </div>
          )}

          {/* Canvas shape indicator */}
          <div style={{
            padding: "8px 10px", borderRadius: 4,
            border: `1px solid ${BRAND.border}`, background: "rgba(12,12,24,0.4)",
            display: "flex", alignItems: "center", gap: 8,
          }}>
            <span style={{ fontSize: 10, color: BRAND.textDim, letterSpacing: 1.5, fontFamily: FONT_HEADING }}>
              CANVAS
            </span>
            <span style={{ fontSize: 12, color: BRAND.yellow, fontFamily: FONT_MONO, fontWeight: 600 }}>
              {shapeInfo?.desc}
            </span>
            <span style={{ fontSize: 10, color: BRAND.textDim, fontFamily: FONT_MONO }}>
              {shapeInfo?.label}
            </span>
          </div>

          <div style={{ fontSize: 16, color: BRAND.textMuted, letterSpacing: 2, fontFamily: FONT_HEADING, marginTop: 8 }}>PLAYERS</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {allPlayers.map(p => (
              <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 6, opacity: p.id === myId ? 1 : .6 }}>
                <Sigil seed={hSeed(p.id)} size={18} />
                <span style={{ fontSize: 16, color: p.id === myId ? BRAND.yellow : "#ccc", fontFamily: FONT_BODY }}>{p.name}</span>
              </div>
            ))}
          </div>

          {/* F1R3INK — Color as Signal */}
          <div style={{
            marginTop: 16, padding: 12, borderRadius: 6,
            border: `1px solid ${BRAND.border}`, background: "rgba(12,12,24,0.6)",
          }}>
            <div style={{ fontSize: 11, color: BRAND.textDim, letterSpacing: 2, fontFamily: FONT_HEADING, marginBottom: 8 }}>
              F1R3 SIGNALS
            </div>
            <div style={{ fontSize: 14, color: "#ccc", fontFamily: FONT_BODY, marginBottom: 10, lineHeight: 1.4 }}>
              How does this F1R3PIX make you feel?
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 3 }}>
              {[BRAND.yellow, BRAND.sage, BRAND.sky, "#7b0429", "#5c0269",
                "#009188", "#0c8e23", "#1114ad", "#FFFFFF", "#3f3f3f"].map(c => (
                <div key={`sig-${c}`} style={{
                  width: 22, height: 22, borderRadius: "50%", background: c, cursor: "pointer",
                  border: signal === c ? "2px solid #fff" : "1px solid rgba(255,255,255,0.1)",
                  transition: "transform 0.15s, box-shadow 0.15s",
                  transform: signal === c ? "scale(1.3)" : "scale(1)",
                }}
                onClick={() => { setSignal(c); setSignalConfirm(true); setTimeout(() => setSignalConfirm(false), 2500); }}
                onMouseEnter={e => { if (signal !== c) { e.target.style.transform = "scale(1.3)"; e.target.style.boxShadow = `0 0 8px ${c}66`; }}}
                onMouseLeave={e => { if (signal !== c) { e.target.style.transform = "scale(1)"; e.target.style.boxShadow = "none"; }}}
                />
              ))}
            </div>
            {signalConfirm && (
              <div style={{
                marginTop: 10, padding: "8px 10px", borderRadius: 4,
                background: "rgba(243,214,48,0.08)", border: `1px solid ${BRAND.yellow}33`,
                fontSize: 13, color: BRAND.yellow, fontFamily: FONT_BODY, lineHeight: 1.4,
              }}>
                noted. we wrote that down.
              </div>
            )}
            {signal && !signalConfirm && (
              <div style={{
                marginTop: 10, fontSize: 12, color: BRAND.textDim, fontFamily: FONT_BODY,
                display: "flex", alignItems: "center", gap: 6,
              }}>
                {myName}'s signal: <div style={{ width: 12, height: 12, borderRadius: "50%", background: signal, border: "1px solid rgba(255,255,255,0.2)" }} />
              </div>
            )}
            <div style={{
              marginTop: 10, fontSize: 11, color: BRAND.textDim, fontFamily: FONT_BODY, fontStyle: "italic",
            }}>
              powered by F1R3INK
            </div>
          </div>
        </div>
      </div>

      {/* Built on F1R3FLY badge */}
      <BuiltOnBadge />
    </div>
  );
}

// ── Mount ─────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(F1R3Pix));
</script>
</body>
</html>
