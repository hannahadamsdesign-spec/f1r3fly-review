<div id="root"></div>

const { useState } = React;

const FH = "'Josefin Sans', sans-serif";
const FB = "'Source Sans 3', sans-serif";
const SKEIN_ACCENT = "#3FA9F5"; // brand sky blue

const SCALE_NOTES = ["C3","D3","E3","G3","A3","C4","D4","E4","G4","A4","C5","D5","E5","G5","A5","C6","D6","E6","G6","A6","C7","D7"];

// Generate demo snippets with colorful bar visualizations
function makeSnippet(id, noteCount, gen, label, engagement, likes, plays, parents) {
  const notes = [];
  for (let i = 0; i < noteCount; i++) {
    notes.push({ pitch: Math.floor(Math.random() * 22), duration: Math.floor(Math.random() * 5) });
  }
  return { id, notes, gen, label, engagement, likes, plays, parents };
}

const SNIPPETS = [
  makeSnippet("483273_1", 9,  0, "Gen-0", 47, 12, 35, null),
  makeSnippet("483273_2", 4,  0, "Gen-0", 31,  8, 23, null),
  makeSnippet("483273_3", 11, 0, "Gen-0", 28,  6, 22, null),
  makeSnippet("483273_4", 7,  0, "Gen-0", 22,  5, 17, null),
  makeSnippet("483273_5", 10, 1, "M♪+F♩", 18,  4, 14, ["483273_1","483273_3"]),
  makeSnippet("483273_6", 4,  0, "Gen-0", 12,  3, 9,  null),
  makeSnippet("483273_7", 7,  1, "F♪+M♩", 9,   2, 7,  ["483273_2","483273_4"]),
  makeSnippet("483273_8", 10, 0, "Gen-0", 5,   1, 4,  null),
];

const BAR_COLORS = ["#F3D630","#8BB999","#3FA9F5","#BF5AF2","#FF6B2B","#009188","#007bc4","#F3D630","#5E5CE6","#8BB999","#3FA9F5"];
function NoteViz({notes, height=48}) {
  return (
    <div style={{display:"flex",gap:2,alignItems:"flex-end",minHeight:height,padding:"4px 0"}}>
      {notes.map((note, i) => {
        const h = 8 + (note.pitch / 21) * 40;
        const w = 4 + note.duration * 6;
        const color = BAR_COLORS[note.pitch % BAR_COLORS.length];
        return <div key={i} style={{width:w,height:h,backgroundColor:color,opacity:0.85,borderRadius:2,transition:"all 0.1s"}} title={SCALE_NOTES[note.pitch]}/>;
      })}
    </div>
  );
}

function HowBtn({onClick}) {
  return <button onClick={onClick} style={{background:"#000",border:`1px solid ${BRAND.border}`,color:"#fff",borderRadius:20,padding:"12px 24px 8px",fontSize:16,cursor:"pointer",fontFamily:FH,letterSpacing:2,fontWeight:400,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38,whiteSpace:"nowrap"}}>HOW THIS WORKS</button>;
}

function TourOverlay({onClose}) {
  const slides = [
    { title:"MELODIES THAT\nEVOLVE", body:"Snippets are short musical phrases — pitches and durations derived from mathematical constants. They live on-chain, and the community decides which survive." },
    { title:"LISTEN\nBOOST\nBREED", body:"Play a snippet to hear it. Like it to boost its engagement score. Select two snippets and breed them — their pitches and durations recombine to produce offspring." },
    { title:"NATURAL SELECTION\nON A SHARD", body:"Low-engagement snippets get culled. High-engagement ones breed. Over generations, the population evolves toward what the community finds beautiful." },
    { title:"BUILT ON\nF1R3FLY", body:"Every snippet, every breed, every vote is a signed transaction on a F1R3FLY shard. The evolutionary history is permanent and auditable." }
  ];
  const [si, setSi] = useState(0); const s = slides[si];

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.92)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FH}} onClick={onClose}>
      <style>{`@keyframes tourIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}`}</style>

        <h2 style={{fontSize:22,fontWeight:700,letterSpacing:4,color:"#fff",lineHeight:1.5,whiteSpace:"pre-line",margin:"0 0 20px"}}>{s.title}</h2>
        <p style={{fontSize:16,color:"#fff",lineHeight:1.8,fontFamily:FB,margin:0}}>{s.body}</p>
        <div style={{display:"flex",justifyContent:"center",gap:8,marginTop:32}}>{slides.map((_,i)=><div key={i} onClick={()=>setSi(i)} style={{width:8,height:8,borderRadius:"50%",background:i===si?SKEIN_ACCENT:BRAND.textSecondary,cursor:"pointer"}} />)}</div>
        <div style={{marginTop:24}}>
          {si<slides.length-1 ? <button onClick={()=>setSi(si+1)} style={{background:"#000",border:`1px solid ${BRAND.border}`,color:"#fff",borderRadius:20,padding:"12px 24px 8px",fontSize:16,fontFamily:FH,fontWeight:600,cursor:"pointer",letterSpacing:2,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38,whiteSpace:"nowrap"}}>NEXT</button>

        </div>
      </div>
    </div>
  );
}

function F1R3Skein() {
  const [phase, setPhase] = useState("join");
  const [myName, setMyName] = useState("");
  const [showTour, setShowTour] = useState(false);
  const [view, setView] = useState("browse");

  const handleJoin = () => { if (myName.trim()) setPhase("play"); };

  if (phase === "join") return (
    <div style={{minHeight:"100vh",background:"#000",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",fontFamily:FH,position:"relative",padding:"40px 20px"}}>
      <style>{FONTS}{`@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}} input:focus{border-color:${BRAND.sky}66 !important;outline:none}`}</style>
      <div style={{animation:"fadeIn .6s ease-out",textAlign:"center",position:"relative",zIndex:1}}>
        <F1R3GamesLogo width={196}/>
        <div style={{fontSize:16,color:"#fff",letterSpacing:6,fontFamily:FH,fontWeight:400,marginTop:24}}>PRESENTS</div>
        <div style={{height:40}}/>
        <div style={{border:`1px dashed ${BRAND.sky}66`,borderRadius:14,padding:"40px 48px",display:"inline-block",background:"#000"}}>
          <h1 style={{margin:"0 0 12px",fontSize:56,fontWeight:700,letterSpacing:6,color:"#fff",fontFamily:FH}}>F1R3<span style={{color:SKEIN_ACCENT}}>SKEIN</span></h1>
          <div style={{fontSize:16,color:"#fff",letterSpacing:4,fontWeight:400,fontFamily:FH}}>MELODIES THAT EVOLVE THROUGH PLAY</div>
        </div>
        <div style={{height:50}}/>
        <div style={{display:"flex",flexDirection:"column",gap:10,alignItems:"center"}}>
          <div style={{fontSize:16,color:BRAND.yellow,letterSpacing:4,fontWeight:700,fontFamily:FH}}>CHOOSE YOUR F1R3SIGN</div>
          <input value={myName} onChange={e=>setMyName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleJoin()} placeholder="someone musical" style={{background:"#000",border:`1px dashed ${BRAND.sky}66`,borderRadius:6,color:"#fff",padding:"10px 16px",fontSize:16,fontWeight:300,width:"100%",maxWidth:460,fontFamily:FH,textAlign:"center",outline:"none",marginTop:20}}/>
          <button onClick={handleJoin} style={{background:`linear-gradient(135deg, #5c0269, #7b0429)`,color:"#fff",border:"none",borderRadius:20,padding:"12px 32px 8px",fontSize:16,fontFamily:FH,fontWeight:600,cursor:"pointer",letterSpacing:3,boxShadow:`0 0 20px rgba(123,4,41,0.4)`,marginTop:20,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38,whiteSpace:"nowrap"}}>JOIN</button>
          <div style={{fontSize:16,color:"#fff",letterSpacing:4,fontWeight:400,fontFamily:FH,lineHeight:2.2,marginTop:20}}>YOUR F1R3SIGN TRAVELS<br/>WITH YOU ACROSS F1R3FLY</div>
          <div style={{marginTop:12}}><HowBtn onClick={()=>setShowTour(true)}/></div>
        </div>
        <div style={{marginTop:16,color:BRAND.textSecondary,fontSize:16}}>8 snippets evolving</div>
      </div>
      <BuiltOnBadge/>
      {showTour && <TourOverlay onClose={()=>setShowTour(false)}/>}
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#000",color:"#fff",fontFamily:FH,display:"flex",flexDirection:"column",position:"relative",paddingBottom:80}}>
      <style>{FONTS}{`::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:${BRAND.border};border-radius:2px}*{box-sizing:border-box}`}</style>

      {/* Header */}
      <div className="game-header" style={{padding:"14px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",background:"#000",minHeight:70,gap:12}}>
        <div style={{display:"flex",alignItems:"baseline",gap:12,flexWrap:"wrap"}}>
          <span style={{fontSize:29,fontWeight:700,letterSpacing:4,fontFamily:FH,color:"#fff"}}>F1R3<span style={{color:SKEIN_ACCENT}}>SKEIN</span></span>
          <span style={{fontSize:16,color:BRAND.textSecondary,letterSpacing:2,fontFamily:FB}}>Gen 1 · Pop 8 · Block #8 · shard live</span>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {["browse","breed","chain"].map(v => (
            <button key={v} onClick={()=>setView(v)} style={{
              background:view===v?`${SKEIN_ACCENT}22`:"transparent",
              border:view===v?`1px solid ${SKEIN_ACCENT}66`:`1px solid ${BRAND.border}`,
              color:view===v?"#fff":BRAND.textSecondary,borderRadius:20,padding:"10px 18px 8px",fontSize:16,
              cursor:"pointer",fontFamily:FH,letterSpacing:2,fontWeight:view===v?600:400,
              textTransform:"uppercase",display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38,whiteSpace:"nowrap"
            }}>{v}</button>
          ))}
          <HowBtn onClick={()=>setShowTour(true)}/>
          <button onClick={()=>setPhase("join")} style={{background:"#000",border:`1px solid ${BRAND.border}`,color:"#fff",borderRadius:20,padding:"10px 18px 8px",fontSize:16,cursor:"pointer",fontFamily:FH,letterSpacing:1,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38,whiteSpace:"nowrap"}}>LEAVE</button>
        </div>
      </div>
      <div style={{width:"100%",height:"0.5px",background:BRAND.stroke,opacity:0.8}}/>

      {/* Content */}
      <div style={{flex:1,padding:"20px 28px",overflow:"auto"}}>
        {view === "browse" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
              <div style={{fontSize:16,color:BRAND.textSecondary,fontFamily:FB}}>Population ranked by engagement · Click ▶ to listen · ♥ to boost</div>
              <button style={{background:`${BRAND.sage}18`,border:`1px solid ${BRAND.sage}66`,color:BRAND.sage,borderRadius:20,padding:"10px 18px 8px",fontSize:16,cursor:"pointer",fontFamily:FH,letterSpacing:2,fontWeight:600,display:"inline-flex",alignItems:"center",justifyContent:"center",lineHeight:1,minHeight:38,whiteSpace:"nowrap"}}>+ DEPLOY RANDOM</button>
            </div>
            <div className="snippet-grid" style={{display:"flex",flexDirection:"column",gap:0}}>
              {SNIPPETS.map((snip, idx) => (
                <div key={snip.id} style={{
                  background:"rgba(255,255,255,0.02)",border:`1px solid ${BRAND.border}`,borderRadius:8,
                  padding:"14px 20px",display:"grid",gridTemplateColumns:"40px 1fr auto",gap:16,alignItems:"center",
                  marginTop: idx === 0 ? 0 : -1
                }} className="snippet-row">
                  <div style={{fontSize:24,fontWeight:700,color:idx<3?SKEIN_ACCENT:BRAND.textSecondary,textAlign:"center",fontFamily:FH}}>{idx+1}</div>
                  <div>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,flexWrap:"wrap"}}>
                      <span style={{fontSize:16,color:"#fff",fontFamily:FH}}>{snip.id}</span>
                      <span style={{fontSize:16,padding:"2px 8px",borderRadius:4,background:`${BRAND.sky}18`,color:BRAND.sky,fontFamily:FH}}>Gen {snip.gen}</span>
                      <span style={{fontSize:16,padding:"2px 8px",borderRadius:4,background:`${BRAND.yellow}18`,color:BRAND.yellow,fontFamily:FH}}>{snip.label}</span>
                      <span style={{fontSize:16,color:BRAND.textSecondary,fontFamily:FB}}>{snip.notes.length} notes</span>
                      {snip.parents && <span style={{fontSize:16,color:BRAND.textSecondary,fontFamily:FB}}>← {snip.parents.join(" × ")}</span>}
                    </div>
                    <NoteViz notes={snip.notes}/>
                  </div>
                  <div style={{display:"flex",gap:8,alignItems:"center"}}>
                    <div style={{textAlign:"right",marginRight:8}}>
                      <div style={{fontSize:32,fontWeight:700,color:SKEIN_ACCENT,fontFamily:FH,lineHeight:1}}>{snip.engagement}</div>
                      <div style={{fontSize:16,color:BRAND.textSecondary,fontFamily:FB,marginTop:4}}>{snip.plays}▶ {snip.likes}♥</div>
                    </div>
                    <button style={{width:40,height:40,borderRadius:"50%",background:`${SKEIN_ACCENT}22`,border:`1px solid ${SKEIN_ACCENT}66`,color:SKEIN_ACCENT,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>▶</button>
                    <button style={{width:40,height:40,borderRadius:"50%",background:"rgba(236,72,153,0.1)",border:"1px solid rgba(236,72,153,0.5)",color:"#f472b6",cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center"}}>♥</button>
                    <button style={{width:40,height:40,borderRadius:"50%",background:`${BRAND.sage}18`,border:`1px solid ${BRAND.sage}66`,color:BRAND.sage,cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:FH}}>⚿</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {view === "breed" && (
          <div style={{textAlign:"center",padding:"60px 20px"}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto 1fr",gap:24,maxWidth:800,margin:"0 auto",alignItems:"start"}}>
              <div style={{border:`1px solid ${BRAND.border}`,borderRadius:10,padding:20,background:"rgba(255,100,130,0.04)"}}>
                <div style={{fontSize:16,color:"#f472b6",letterSpacing:3,fontFamily:FH,fontWeight:600,marginBottom:12}}>♀ MOTHER</div>
                <div style={{fontSize:16,color:BRAND.textSecondary,fontFamily:FB,padding:"24px 0"}}>Select a snippet from Browse view</div>
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,paddingTop:30}}>
                <button style={{width:56,height:56,borderRadius:"50%",background:"rgba(30,30,50,0.5)",border:`1px solid ${BRAND.border}`,color:BRAND.textSecondary,cursor:"not-allowed",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center"}}>⚿</button>
                <div style={{fontSize:16,color:BRAND.textSecondary,fontFamily:FH,letterSpacing:2}}>BREED</div>
              </div>
              <div style={{border:`1px solid ${BRAND.border}`,borderRadius:10,padding:20,background:"rgba(100,150,255,0.04)"}}>
                <div style={{fontSize:16,color:"#60a5fa",letterSpacing:3,fontFamily:FH,fontWeight:600,marginBottom:12}}>♂ FATHER</div>
                <div style={{fontSize:16,color:BRAND.textSecondary,fontFamily:FB,padding:"24px 0"}}>Select a snippet from Browse view</div>
              </div>
            </div>
          </div>
        )}

        {view === "chain" && (
          <div>
            <div style={{fontSize:16,color:BRAND.textSecondary,fontFamily:FB,marginBottom:20}}>F1R3FLY Shard Tuplespace · Rholang State Channels</div>

}
