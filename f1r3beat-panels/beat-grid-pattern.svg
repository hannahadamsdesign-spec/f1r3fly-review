<?xml version="1.0" encoding="UTF-8"?>
<!-- F1R3Beat background pattern — mirrors the game's opening groove (16 steps × 8 instruments).
     Tile: 512×256. Cell: 32px. Filled cells: 20×20, rx=3, row-colored. Tiles seamlessly. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 256" width="512" height="256">
  <!-- KICK (rose) — 4-on-the-floor, cols 0 4 8 12 -->
  <rect x="6"   y="6"   width="20" height="20" rx="3" fill="#FF2D55"/>
  <rect x="134" y="6"   width="20" height="20" rx="3" fill="#FF2D55"/>
  <rect x="262" y="6"   width="20" height="20" rx="3" fill="#FF2D55"/>
  <rect x="390" y="6"   width="20" height="20" rx="3" fill="#FF2D55"/>
  <!-- SNARE (ember) — backbeat, cols 4 12 -->
  <rect x="134" y="38"  width="20" height="20" rx="3" fill="#FF6B2B"/>
  <rect x="390" y="38"  width="20" height="20" rx="3" fill="#FF6B2B"/>
  <!-- HIHAT (yellow) — 8ths, cols 0 2 4 6 8 10 12 14 -->
  <rect x="6"   y="70"  width="20" height="20" rx="3" fill="#F3D630"/>
  <rect x="70"  y="70"  width="20" height="20" rx="3" fill="#F3D630"/>
  <rect x="134" y="70"  width="20" height="20" rx="3" fill="#F3D630"/>
  <rect x="198" y="70"  width="20" height="20" rx="3" fill="#F3D630"/>
  <rect x="262" y="70"  width="20" height="20" rx="3" fill="#F3D630"/>
  <rect x="326" y="70"  width="20" height="20" rx="3" fill="#F3D630"/>
  <rect x="390" y="70"  width="20" height="20" rx="3" fill="#F3D630"/>
  <rect x="454" y="70"  width="20" height="20" rx="3" fill="#F3D630"/>
  <!-- OPENHH (gold) — sparse, cols 7 15 -->
  <rect x="230" y="102" width="20" height="20" rx="3" fill="#FFD60A"/>
  <rect x="486" y="102" width="20" height="20" rx="3" fill="#FFD60A"/>
  <!-- TOM LO (sage) — ghost, col 10 -->
  <rect x="326" y="134" width="20" height="20" rx="3" fill="#8BB999"/>
  <!-- TOM HI (sky) — ghost, col 14 -->
  <rect x="454" y="166" width="20" height="20" rx="3" fill="#3FA9F5"/>
  <!-- CLAP (indigo) — backbeat, cols 4 12 -->
  <rect x="134" y="198" width="20" height="20" rx="3" fill="#5E5CE6"/>
  <rect x="390" y="198" width="20" height="20" rx="3" fill="#5E5CE6"/>
  <!-- RIM (violet) — cols 2 10 -->
  <rect x="70"  y="230" width="20" height="20" rx="3" fill="#BF5AF2"/>
  <rect x="326" y="230" width="20" height="20" rx="3" fill="#BF5AF2"/>
</svg>
