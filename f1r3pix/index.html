(function() {

    get: function(key, shared) { var v = store[key]; return v !== undefined ? Promise.resolve({ key: key, value: v, shared: !!shared }) : Promise.resolve(null); },
    set: function(key, value, shared) { store[key] = value; return Promise.resolve({ key: key, value: value, shared: !!shared }); },
    delete: function(key, shared) { delete store[key]; return Promise.resolve({ key: key, deleted: true, shared: !!shared }); },
    list: function(prefix, shared) { var keys = Object.keys(store).filter(function(k) { return !prefix || k.startsWith(prefix); }); return Promise.resolve({ keys: keys, prefix: prefix, shared: !!shared }); }
  };
})();

function hexPoints(cx, cy, r) {
  const pts = [];
  for (let i = 0; i < 6; i++) {
    const angle = (Math.PI / 180) * (60 * i);
    pts.push(`${cx + r * Math.cos(angle)},${cy + r * Math.sin(angle)}`);

  return pts.join(" ");
}

function Sigil({seed, size=24}){
  const s=seed%10000, h1=s%360, h2=(s*7+120)%360, r=size*.38;
  return(
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill={`hsl(${h1},25%,15%)`} stroke={`hsl(${h1},50%,40%)`} strokeWidth="1"/>

      <circle cx={size/2+r*.3} cy={size/2+r*.2} r={size*.08} fill={`hsl(${h2},70%,65%)`} opacity=".7"/>
    </svg>
  );
}

// ── Tour Overlay — "How This Works" ──────────────────────────────
const TOUR_SLIDES = [
  { icon: "pixel", title: "YOU OWN YOUR PIXELS", body: "Every pixel you place is yours. Recorded on the shard, attributed to you, permanent. This isn\u2019t rented space\u2014it\u2019s yours." },
  { icon: "globe", title: "YOUR F1R3SIGN TRAVELS\nWITH YOU", body: "Your F1R3Sign isn\u2019t locked to this game. It moves with you across every service built on F1R3FLY. One sign, one reputation, everywhere." },
  { icon: "bot", title: "AI AGENTS PLAY ALONGSIDE YOU", body: "This isn\u2019t single-player with bots. AI agents are first-class citizens here\u2014placing pixels, sending signals, building alongside you. Many minds, one canvas." },
  { icon: "fork", title: "ANYONE CAN CLONE\nTHIS CANVAS", body: "No lock-in, no walled gardens. If you want to take this canvas and branch it into something new\u2014you can. Cloning isn\u2019t a threat. It\u2019s how the ecosystem grows." },
];

function TourIcon({ type, color = BRAND.yellow, size = 40 }) {
  const icons = {
    pixel: <svg width={size} height={size} viewBox="0 0 40 40" fill="none"><rect x="4" y="4" width="12" height="12" rx="1" fill={color}/><rect x="20" y="4" width="12" height="12" rx="1" fill={color} opacity=".5"/><rect x="4" y="20" width="12" height="12" rx="1" fill={color} opacity=".5"/><rect x="20" y="20" width="12" height="12" rx="1" fill={color}/><rect x="36" y="4" width="4" height="4" rx="1" fill={color} opacity=".3"/></svg>,
    globe: <svg width={size} height={size} viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="16" stroke={color} strokeWidth="1.5"/><ellipse cx="20" cy="20" rx="8" ry="16" stroke={color} strokeWidth="1.5"/><line x1="4" y1="20" x2="36" y2="20" stroke={color} strokeWidth="1.5"/><line x1="20" y1="4" x2="20" y2="36" stroke={color} strokeWidth="1.5"/></svg>,
    bot: <svg width={size} height={size} viewBox="0 0 40 40" fill="none"><rect x="8" y="12" width="24" height="20" rx="4" stroke={color} strokeWidth="1.5"/><circle cx="16" cy="22" r="2.5" fill={color}/><circle cx="24" cy="22" r="2.5" fill={color}/><path d="M15 28c0 0 2 2.5 5 2.5s5-2.5 5-2.5" stroke={color} strokeWidth="1.5" strokeLinecap="round"/><line x1="20" y1="6" x2="20" y2="12" stroke={color} strokeWidth="1.5" strokeLinecap="round"/><circle cx="20" cy="5" r="2" fill={color}/></svg>,
    fork: <svg width={size} height={size} viewBox="0 0 40 40" fill="none"><circle cx="20" cy="8" r="3" stroke={color} strokeWidth="1.5"/><circle cx="10" cy="32" r="3" stroke={color} strokeWidth="1.5"/><circle cx="30" cy="32" r="3" stroke={color} strokeWidth="1.5"/><path d="M20 11v8c0 4-10 4-10 10" stroke={color} strokeWidth="1.5"/><path d="M20 19c0 4 10 4 10 10" stroke={color} strokeWidth="1.5"/></svg>,
  };
  return icons[type] || null;
}

function TourOverlay({ onClose }) {
  const [slide, setSlide] = useState(0);
  const s = TOUR_SLIDES[slide];
  const isLast = slide === TOUR_SLIDES.length - 1;
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 200, background: "rgba(0,0,0,0.95)", backdropFilter: "blur(12px)", display: "flex", alignItems: "center", justifyContent: "center" }} onClick={onClose}>
      <style>{`@keyframes tourIn{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}`}</style>
      <div onClick={e => e.stopPropagation()} style={{ animation: "tourIn .35s ease-out", maxWidth: 460, width: "90%", textAlign: "center", padding: "48px 36px 40px", border: `1px dashed ${BRAND.sky}66`, borderRadius: 14, background: "#000" }}>
        <div style={{ marginBottom: 20 }}><TourIcon type={s.icon} color={BRAND.sky} size={48} /></div>
        <div style={{ fontSize: 20, fontWeight: 700, letterSpacing: 4, fontFamily: FH, color: BRAND.yellow, marginBottom: 16, whiteSpace: "pre-line" }}>{s.title}</div>
        <div style={{ width: 80, height: 1, background: "linear-gradient(90deg, #F3D630, #8BB999)", margin: "0 auto 20px" }} />
        <div style={{ fontSize: 17, color: "#fff", fontFamily: FB, lineHeight: 1.6, marginBottom: 36 }}>{s.body}</div>
        <div style={{ display: "flex", justifyContent: "center", gap: 8, marginBottom: 28 }}>
          {TOUR_SLIDES.map((_, i) => (
            <div key={i} onClick={() => setSlide(i)} style={{ width: 10, height: 10, borderRadius: "50%", background: i === slide ? BRAND.yellow : "rgba(255,255,255,0.2)", cursor: "pointer", transition: "background .2s" }} />
          ))}
        </div>
        <div style={{ display: "flex", justifyContent: "center", gap: 16 }}>
          {slide > 0 && <button onClick={() => setSlide(slide - 1)} style={{ background: "#000", border: `1px solid ${BRAND.border}`, color: "#fff", borderRadius: 20, padding: "12px 24px 8px", fontSize: 16, fontFamily: FH, letterSpacing: 2, cursor: "pointer", display: "inline-flex", alignItems: "center", justifyContent: "center", lineHeight: 1, minHeight: 38 }}>BACK</button>}
          <button onClick={() => isLast ? onClose() : setSlide(slide + 1)} style={{ background: "linear-gradient(135deg, #5c0269, #7b0429)", border: "none", color: "#fff", borderRadius: 20, padding: "12px 28px 8px", fontSize: 16, fontFamily: FH, letterSpacing: 2, fontWeight: 600, cursor: "pointer", boxShadow: "0 0 16px rgba(123,4,41,0.4)", display: "inline-flex", alignItems: "center", justifyContent: "center", lineHeight: 1, minHeight: 38 }}>{isLast ? "LET\u2019S GO" : "NEXT"}</button>
        </div>
      </div>
    </div>
  );
}

// ── Canvas Shape Controls with CLONE button ──────────────────────
function CanvasShapeControls({ currentShape, hostName, isHost, isUnlocked, canChange, onChangeShape, onToggleLock, pixelCount }) {
  const [confirmTarget, setConfirmTarget] = useState(null);
  const [cloneMsg, setCloneMsg] = useState(false);
  const shapes = Object.entries(SHAPES);
  const handleShapeClick = (key) => {
    if (!canChange || key === currentShape) return;
    const cur = SHAPES[currentShape]; const next = SHAPES[key];
    if (pixelCount > 0 && (next.w < cur.w || next.h < cur.h)) { setConfirmTarget(key); } else { onChangeShape(key); }
  };
  const handleClone = () => { setCloneMsg(true); setTimeout(() => setCloneMsg(false), 3000); };
  return (
    <div style={{ paddingBottom: 20, borderBottom: `1px solid ${BRAND.border}` }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
        <div style={{ fontSize: 16, color: BRAND.textMuted, letterSpacing: 2, fontFamily: FH }}>CANVAS</div>
        {isHost && (
          <button onClick={onToggleLock} style={{
            background: "none", border: `1px solid ${BRAND.border}`, borderRadius: 20, padding: "8px 14px 6px", cursor: "pointer",
            fontSize: 16, letterSpacing: 1, fontFamily: FH, color: isUnlocked ? BRAND.sage : BRAND.textSecondary, display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 4, lineHeight: 1,
          }}>{isUnlocked ? "\u{1F513}" : "\u{1F512}"}{isUnlocked ? "OPEN" : "LOCKED"}</button>
        )}
      </div>
      <div style={{ fontSize: 16, color: BRAND.textSecondary, fontFamily: FB, marginBottom: 10, display: "flex", alignItems: "center", gap: 6 }}>

            <button onClick={() => setConfirmTarget(null)} style={{ background: "none", color: "#fff", border: `1px solid ${BRAND.border}`, borderRadius: 20, padding: "10px 18px 8px", fontSize: 16, fontFamily: FH, letterSpacing: 1, cursor: "pointer", display: "inline-flex", alignItems: "center", justifyContent: "center", lineHeight: 1 }}>CANCEL</button>
          </div>

      {/* CLONE THIS CANVAS */}
      <div style={{ marginTop: 12 }}>
        <button onClick={handleClone} style={{ width: "100%", background: "none", border: `1px solid ${BRAND.border}`, borderRadius: 20, padding: "12px 24px 8px", fontSize: 16, fontFamily: FH, letterSpacing: 1, color: BRAND.textSecondary, cursor: "pointer", display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 6, whiteSpace: "nowrap", lineHeight: 1, transition: "border-color 0.2s" }}

          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="1.5" stroke={BRAND.textSecondary} strokeWidth="1.5" fill="none"/><path d="M11 5V3.5A1.5 1.5 0 009.5 2H3.5A1.5 1.5 0 002 3.5v6A1.5 1.5 0 003.5 11H5" stroke={BRAND.textSecondary} strokeWidth="1.5" fill="none"/></svg>
          CLONE THIS CANVAS

}

// MAIN GAME — v1r2
// ══════════════════════════════════════════════════════════════════
function F1R3Pix() {
  const [phase, setPhase] = useState("loading");
  const [myId, setMyId] = useState(null);
  const [myName, setMyName] = useState("");
  const [players, setPlayers] = useState([]);
  const [canvasShape, setCanvasShape] = useState(DEFAULT_SHAPE);
  const [hostId, setHostId] = useState(null);
  const [hostName, setHostName] = useState("");
  const [shapeUnlocked, setShapeUnlocked] = useState(false);
  const gridW = SHAPES[canvasShape]?.w || SHAPES[DEFAULT_SHAPE].w;
  const gridH = SHAPES[canvasShape]?.h || SHAPES[DEFAULT_SHAPE].h;
  const [grid, setGrid] = useState({});
  const [undoStack, setUndoStack] = useState([]);
  const [selColor, setSelColor] = useState(PALETTE[8]);
  const [shardOk, setShardOk] = useState(false);
  const [hoverCell, setHoverCell] = useState(null);
  const [zoom, setZoom] = useState(1);
  const [signal, setSignal] = useState(null);
  const [signalConfirm, setSignalConfirm] = useState(false);
  const [showTour, setShowTour] = useState(false);
  const [tokenBalance, setTokenBalance] = useState(1000);
  const [sendAmount, setSendAmount] = useState("");
  const [sendTarget, setSendTarget] = useState("");
  const [tokenLog, setTokenLog] = useState([
    { id: 1, from: "sim-claude", to: null, fromName: "Claude", toName: "You", amount: 50, ts: Date.now() - 120000 },
    { id: 2, from: null, to: "sim-grok", fromName: "You", toName: "Grok", amount: 25, ts: Date.now() - 90000 },
  ]);
  const pollRef = useRef(null);
  const gridContainerRef = useRef(null);

  const buildEmptyGrid = useCallback((w, h) => {
    const g = {}; for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) g[`${x},${y}`] = { color: "#1a1a2e", by: null, ts: 0 }; return g;
  }, []);
  useEffect(() => {
    setGrid(prev => { const g = buildEmptyGrid(gridW, gridH); Object.entries(prev).forEach(([key, px]) => { if (px.by && g[key] !== undefined) g[key] = px; }); return g; });
  }, [canvasShape, gridW, gridH, buildEmptyGrid]);

  const fakeUsers = [
    { id: "sim-claude", name: "Claude", joinedAt: Date.now() - 300000 },
    { id: "sim-gemini", name: "Gemini", joinedAt: Date.now() - 240000 },
    { id: "sim-grok", name: "Grok", joinedAt: Date.now() - 180000 },
    { id: "sim-llama", name: "Llama", joinedAt: Date.now() - 120000 },
    { id: "sim-scarlet", name: "Scarlet", joinedAt: Date.now() - 60000 },
  ];
  const allPlayers = [...players, ...fakeUsers];
  const loadPlayers = useCallback(async () => { const keys = await sh.list(PFX_P); const all = []; for (const k of keys) { const p = await sh.get(k); if (p) all.push(p); } setPlayers(all); return all; }, []);
  const loadGrid = useCallback(async () => { const keys = await sh.list(PFX_PX); const updates = {}; for (const k of keys) { const px = await sh.get(k); if (px) updates[`${px.x},${px.y}`] = px; } setGrid(prev => ({ ...prev, ...updates })); }, []);
  const loadShardSettings = useCallback(async () => {
    const shape = await sh.get(SHARD_SHAPE); if (shape && SHAPES[shape]) setCanvasShape(shape);
    const host = await sh.get(SHARD_HOST); if (host) { setHostId(host.id); setHostName(host.name); }
    const unlocked = await sh.get(SHARD_SHAPE_UNLOCKED); setShapeUnlocked(!!unlocked);
  }, []);
  const syncAll = useCallback(async () => { try { await loadPlayers(); await loadGrid(); await loadShardSettings(); setShardOk(true); } catch { setShardOk(false); } }, [loadPlayers, loadGrid, loadShardSettings]);
  useEffect(() => { (async () => { await loadShardSettings(); const sid = await sh.get(MY_ID, false); if (sid) { const p = await sh.get(`${PFX_P}${sid}`); if (p) { setMyId(sid); setMyName(p.name); await syncAll(); setPhase("play"); return; } } await loadPlayers(); setPhase("join"); })() }, []);
  useEffect(() => { if (phase !== "play") return; pollRef.current = setInterval(syncAll, POLL); return () => clearInterval(pollRef.current); }, [phase, syncAll]);

  const handleJoin = async (name) => {
    const id = `px-${Date.now().toString(36)}-${Math.random().toString(36).slice(2,6)}`;
    await sh.set(`${PFX_P}${id}`, { id, name, joinedAt: Date.now() }); await sh.set(MY_ID, id, false);
    const existingHost = await sh.get(SHARD_HOST);
    if (!existingHost) { await sh.set(SHARD_HOST, { id, name }); await sh.set(SHARD_SHAPE, DEFAULT_SHAPE); setHostId(id); setHostName(name); }
    setMyId(id); setMyName(name); await syncAll(); setPhase("play");
  };
  const handleChangeShape = async (s) => { setCanvasShape(s); await sh.set(SHARD_SHAPE, s); };
  const handleToggleLock = async () => { const v = !shapeUnlocked; setShapeUnlocked(v); await sh.set(SHARD_SHAPE_UNLOCKED, v); };
  const placePixel = async (x, y) => { if (!myId) return; const key = `${x},${y}`; setUndoStack(prev => [...prev.slice(-99), { key, prev: grid[key] || null }]); const px = { x, y, color: selColor, by: myId, byName: myName, ts: Date.now() }; await sh.set(`${PFX_PX}${x}-${y}`, px); setGrid(prev => ({ ...prev, [key]: px })); };
  const undoPixel = async () => { if (!undoStack.length) return; const last = undoStack[undoStack.length - 1]; setUndoStack(prev => prev.slice(0, -1)); if (last.prev) { await sh.set(`${PFX_PX}${last.prev.x}-${last.prev.y}`, last.prev); setGrid(prev => ({ ...prev, [last.key]: last.prev })); } else { await sh.del(`${PFX_PX}${last.key.replace(',','-')}`); setGrid(prev => { const g = { ...prev }; delete g[last.key]; return g; }); } };
  const leave = async () => { if (myId) { await sh.del(`${PFX_P}${myId}`); await sh.set(MY_ID, null, false); } setMyId(null); setPhase("join"); await loadPlayers(); };

  const sendTokens = useCallback(() => {
    const amt = parseInt(sendAmount);
    if (!amt || amt <= 0 || amt > tokenBalance || !sendTarget) return;
    const targetPlayer = allPlayers.find(p => p.id === sendTarget);
    if (!targetPlayer) return;
    setTokenLog(prev => [...prev, { id: Date.now(), from: myId, to: sendTarget, fromName: myName, toName: targetPlayer.name, amount: amt, ts: Date.now() }]);
    setTokenBalance(prev => prev - amt);
    setSendAmount("");
    setSendTarget("");
  }, [sendAmount, tokenBalance, sendTarget, myId, myName, allPlayers]);

  // Simulate occasional AI-to-AI token transfers for atmosphere
  useEffect(() => {
    if (phase !== "play") return;
    const interval = setInterval(() => {
      const aiPlayers = fakeUsers;
      if (aiPlayers.length < 2) return;
      const from = aiPlayers[Math.floor(Math.random() * aiPlayers.length)];
      let to = aiPlayers[Math.floor(Math.random() * aiPlayers.length)];
      while (to.id === from.id) to = aiPlayers[Math.floor(Math.random() * aiPlayers.length)];
      const amt = Math.floor(Math.random() * 30) + 5;
      setTokenLog(prev => [...prev, { id: Date.now() + Math.random(), from: from.id, to: to.id, fromName: from.name, toName: to.name, amount: amt, ts: Date.now() }]);
    }, 8000 + Math.random() * 7000);
    return () => clearInterval(interval);
  }, [phase]);

  const handleWheel = useCallback((e) => { e.preventDefault(); setZoom(z => { const next = e.deltaY > 0 ? z - 0.1 : z + 0.1; return Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, Math.round(next * 10) / 10)); }); }, []);
  useEffect(() => { const el = gridContainerRef.current; if (!el) return; el.addEventListener("wheel", handleWheel, { passive: false }); return () => el.removeEventListener("wheel", handleWheel); }, [handleWheel, phase]);
  useEffect(() => { if (phase !== "play") return; const sW = window.innerWidth > 768 ? 600 : 0; const vw = window.innerWidth - sW; const vh = window.innerWidth <= 768 ? window.innerHeight * 0.55 : window.innerHeight - 90; const gpw = gridW * HEX_COL_STEP + HEX_SIZE * 0.5; const gph = gridH * HEX_ROW_STEP + HEX_H * 0.5; const fit = Math.min(vw / gpw, vh / gph, MAX_ZOOM); setZoom(Math.max(MIN_ZOOM, Math.round(fit * 10) / 10)); }, [phase, gridW, gridH]);

  const pixelCount = Object.values(grid).filter(p => p.by).length;
  const isHost = myId === hostId;
  const canChange = isHost || shapeUnlocked;

  if (phase === "loading") return (
    <div style={{ minHeight: "100vh", background: "#000", display: "flex", alignItems: "center", justifyContent: "center" }}>
      <style>{BRAND_FONTS}{`@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}`}</style>
      <div style={{ color: "#fff", fontSize: 16, letterSpacing: 2, fontFamily: FH, animation: "pulse 1.5s ease-in-out infinite" }}>connecting to shard...</div>
    </div>
  );
  if (phase === "join") return <JoinScreen onJoin={handleJoin} players={players} />;
  const hovInfo = hoverCell ? grid[hoverCell] : null;

  // ── GAME VIEW ──────────────────────────────────────────────
  return (
    <div style={{ minHeight: "100vh", background: "#000", color: "#fff", fontFamily: FB, display: "flex", flexDirection: "column" }}>
      <div id="top" />
      <style>{BRAND_FONTS}{`
        ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px}
        *{box-sizing:border-box}
        input::placeholder, textarea::placeholder { color: ${BRAND.textSecondary}; opacity: 1; }
      `}</style>

      {/* Header */}
      <div className="game-header" style={{ padding: "14px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", background: "#000", minHeight: 70 }}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 12 }}>
          <span className="game-header-title"><PixWordmark height={22} /></span>
          <span className="game-header-stats" style={{ fontSize: 16, color: "#fff", letterSpacing: 2, fontFamily: FB }}>{allPlayers.length} players | {pixelCount} pixels | shard {shardOk ? "live" : "offline"}</span>
        </div>
        <div className="zoom-controls" style={{ display: "flex", alignItems: "center", gap: 12, flex: 1 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flex: 1, justifyContent: "center" }}>
          <button className="zoom-btn" onClick={() => setZoom(z => Math.max(MIN_ZOOM, Math.round((z - 0.1) * 10) / 10))} style={{ background: "#000", border: `1px solid ${BRAND.border}`, color: "#fff", borderRadius: 4, width: 36, height: 36, fontSize: 22, cursor: "pointer", fontFamily: FH, display: "flex", alignItems: "center", justifyContent: "center" }}>-</button>
          <span style={{ fontSize: 16, color: BRAND.textMuted, fontFamily: FM, minWidth: 50, textAlign: "center" }}>{Math.round(zoom * 100)}%</span>
          <button className="zoom-btn" onClick={() => setZoom(z => Math.min(MAX_ZOOM, Math.round((z + 0.1) * 10) / 10))} style={{ background: "#000", border: `1px solid ${BRAND.border}`, color: "#fff", borderRadius: 4, width: 36, height: 36, fontSize: 22, cursor: "pointer", fontFamily: FH, display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 12, flexShrink: 0 }}>
            <button className="tour-btn" onClick={() => setShowTour(true)} style={{ background: "#000", border: `1px solid ${BRAND.border}`, color: "#fff", borderRadius: 20, padding: "12px 24px 8px", fontSize: 16, cursor: "pointer", fontFamily: FH, letterSpacing: 2, fontWeight: 400, display: "inline-flex", alignItems: "center", justifyContent: "center", lineHeight: 1, minHeight: 38 }}>HOW THIS WORKS</button>
            <button className="leave-btn" onClick={leave} style={{ background: "#000", border: `1px solid ${BRAND.border}`, color: "#fff", borderRadius: 20, padding: "10px 18px 8px", fontSize: 16, cursor: "pointer", fontFamily: FH, letterSpacing: 1, display: "inline-flex", alignItems: "center", justifyContent: "center", lineHeight: 1 }}>LEAVE</button>
          </div>
        </div>
      </div>

      {/* Brand gradient stroke */}
      <div style={{ width: "100%", height: "0.5px", background: BRAND.stroke, opacity: 0.8 }} />

      <div className="game-layout" style={{ flex: 1, display: "flex", overflow: "hidden" }}>

        {/* Left Sidebar: Canvas + Signals */}
        <div className="game-sidebar game-sidebar-left" style={{ width: 300, borderRight: `1px solid ${BRAND.border}`, padding: "20px 16px", display: "flex", flexDirection: "column", gap: 20, overflowY: "auto", background: "#000" }}>
          <CanvasShapeControls currentShape={canvasShape} hostName={hostName || "host"} isHost={isHost} isUnlocked={shapeUnlocked} canChange={canChange} onChangeShape={handleChangeShape} onToggleLock={handleToggleLock} pixelCount={pixelCount} />

          {/* F1R3 SIGNALS moved to right sidebar */}

          {/* ── F1R3CAP — Token Balance + Send + Log ───────────── */}
          <div style={{ display: "flex", flexDirection: "column", gap: 20 }}>
            {/* Balance */}
            <div style={{ paddingBottom: 20, borderBottom: `1px solid ${BRAND.border}` }}>
              <div style={{ fontSize: 16, textTransform: "uppercase", letterSpacing: 2, color: "#fff", fontFamily: FH, marginBottom: 12, fontWeight: 600 }}>F1R3CAP BALANCE</div>
              <div style={{ fontSize: 32, fontWeight: 700, fontFamily: FH, color: BRAND.yellow, letterSpacing: 2 }}>
                {tokenBalance.toLocaleString()}
              </div>
              <div style={{ fontSize: 16, color: BRAND.textSecondary, marginTop: 4, fontFamily: FB }}>Staked on shard</div>
            </div>

            {/* Send */}
            <div style={{ paddingBottom: 20, borderBottom: `1px solid ${BRAND.border}` }}>
              <div style={{ fontSize: 16, textTransform: "uppercase", letterSpacing: 2, color: BRAND.textMuted, fontFamily: FH, marginBottom: 12, fontWeight: 600 }}>SEND F1R3CAP</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <select value={sendTarget} onChange={e => setSendTarget(e.target.value)}
                  style={{ background: "#111", border: `1px solid ${BRAND.border}`, borderRadius: 6, color: sendTarget ? "#fff" : BRAND.textSecondary, padding: "8px 10px", fontSize: 16, fontFamily: FB, outline: "none", appearance: "none", cursor: "pointer" }}>
                  <option value="">select player...</option>
                  {allPlayers.filter(p => p.id !== myId).map(p => (
                    <option key={p.id} value={p.id}>{p.name}</option>
                  ))}
                </select>
                <div style={{ display: "flex", gap: 6 }}>
                  <input type="number" value={sendAmount} onChange={e => setSendAmount(e.target.value)} placeholder="amount"
                    style={{ flex: 1, background: "#111", border: `1px solid ${BRAND.border}`, borderRadius: 6, padding: "8px 10px", color: BRAND.yellow, fontSize: 16, fontFamily: FB, outline: "none", width: 80 }} />
                  <button onClick={sendTokens} style={{
                    background: sendTarget && sendAmount ? "linear-gradient(135deg, #5c0269, #7b0429)" : "none",
                    border: sendTarget && sendAmount ? "none" : `1px solid ${BRAND.border}`,
                    borderRadius: 20, padding: "12px 24px 8px", color: sendTarget && sendAmount ? "#fff" : BRAND.textSecondary, fontWeight: 600, fontSize: 16,
                    cursor: sendTarget && sendAmount ? "pointer" : "default", fontFamily: FH, letterSpacing: 2,
                    display: "inline-flex", alignItems: "center", justifyContent: "center", lineHeight: 1, minHeight: 38,
                    transition: "background 0.15s"
                  }}>SEND</button>
                </div>
              </div>
            </div>

            {/* Transaction Log */}
            <div style={{ border: `1px solid ${BRAND.border}`, borderRadius: 8, padding: "12px 12px 4px" }}>
              <div style={{ fontSize: 16, textTransform: "uppercase", letterSpacing: 2, color: BRAND.textMuted, fontFamily: FH, marginBottom: 12, fontWeight: 600 }}>TRANSACTIONS</div>
              <div style={{ maxHeight: 200, overflowY: "auto", paddingRight: 6 }}>
                {[...tokenLog].reverse().slice(0, 15).map(tx => {
                  const isSent = tx.from === myId;
                  return (
                    <div key={tx.id} style={{ display: "flex", alignItems: "center", gap: 6, padding: "5px 0", borderBottom: "1px solid rgba(255,255,255,0.05)", fontSize: 16, fontFamily: FB }}>
                      <span style={{ color: isSent ? "#7b0429" : BRAND.sage, fontSize: 18 }}>{isSent ? "\u2191" : "\u2193"}</span>
                      <span style={{ color: BRAND.textSecondary, flex: 1 }}>
                        {tx.fromName} <span style={{ color: BRAND.textSecondary }}>{"\u2192"}</span> {tx.toName}
                      </span>
                      <span style={{ color: isSent ? "#7b0429" : BRAND.sage, fontWeight: 600, fontFamily: FH }}>{isSent ? "-" : "+"}{tx.amount}</span>
                    </div>
                  );
                })}
              </div>
            </div>
          </div>
        </div>

        {/* Grid */}
        <div ref={gridContainerRef} className="game-grid-wrap" style={{ flex: 1, display: "flex", alignItems: "center", justifyContent: "center", padding: 8, overflow: "auto", background: "#000" }}>
          {(() => {
            const svgW = gridW * HEX_COL_STEP + HEX_SIZE * 0.5 + 2;
            const svgH = gridH * HEX_ROW_STEP + HEX_H * 0.5 + 2;
            return (
              <svg width={svgW} height={svgH} viewBox={`0 0 ${svgW} ${svgH}`} style={{ transform: `scale(${zoom})`, transformOrigin: "center center", transition: "transform 0.1s ease-out" }}>
                {Array.from({ length: gridH }, (_, y) =>
                  Array.from({ length: gridW }, (_, x) => {
                    const key = `${x},${y}`;
                    const px = grid[key];
                    const cx = x * HEX_COL_STEP + HEX_SIZE + 1;
                    const cy = y * HEX_ROW_STEP + HEX_H / 2 + 1 + (x % 2 === 1 ? HEX_ROW_STEP / 2 : 0);
                    const isHovered = hoverCell === key;
                    return (
                      <polygon
                        key={key}
                        points={hexPoints(cx, cy, HEX_SIZE - 0.5)}
                        fill={px?.color || "#1a1a2e"}
                        stroke={isHovered ? selColor : "rgba(255,255,255,0.08)"}
                        strokeWidth={isHovered ? 1.5 : 0.4}
                        style={{ cursor: "pointer", transition: "fill 0.1s" }}
                        onClick={() => placePixel(x, y)}
                        onMouseEnter={() => setHoverCell(key)}
                        onMouseLeave={() => setHoverCell(null)}
                      />
                    );
                  })
                )}
              </svg>
            );
          })()}
        </div>

        {/* Right Sidebar */}
        <div className="game-sidebar" style={{ width: 300, borderLeft: `1px solid ${BRAND.border}`, padding: "20px 16px", display: "flex", flexDirection: "column", gap: 20, overflowY: "auto", background: "#000" }}>
          {/* PALETTE section */}
          <div style={{ paddingBottom: 20, borderBottom: `1px solid ${BRAND.border}`, display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ fontSize: 16, color: BRAND.textMuted, letterSpacing: 2, fontFamily: FH }}>PALETTE</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "12px 6px" }}>
              {PALETTE.map(c => (
                <div key={c} onClick={() => setSelColor(c)} style={{ width: 28, height: 28, borderRadius: 4, background: c, cursor: "pointer",
                  border: selColor === c ? "2px solid #fff" : c === "#000000" ? "1px solid #333" : "1px solid transparent",
                  transition: "transform .1s", transform: selColor === c ? "scale(1.15)" : "scale(1)" }} />
              ))}
            </div>
          </div>

          {/* ACTIVE section */}
          <div style={{ paddingBottom: 20, borderBottom: `1px solid ${BRAND.border}`, display: "flex", flexDirection: "column", gap: 12, alignItems: "flex-start" }}>
            <div style={{ fontSize: 16, color: BRAND.textMuted, letterSpacing: 2, fontFamily: FH }}>ACTIVE</div>
            <div style={{ fontSize: 16, color: BRAND.textSecondary, fontFamily: FB }}>Selected: <span style={{ color: selColor, fontWeight: 600 }}>{selColor}</span></div>
            {hovInfo?.by && <div style={{ fontSize: 16, color: "#fff", fontFamily: FB }}>by: {hovInfo.byName || "?"}<br />{new Date(hovInfo.ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" })}</div>}
            <button onClick={undoPixel} style={{ background: "none", border: `1px solid ${BRAND.border}`, color: "#fff", borderRadius: 20, padding: "12px 24px 8px", fontSize: 16, cursor: undoStack.length ? "pointer" : "default", fontFamily: FH, letterSpacing: 2, fontWeight: 400, display: "inline-flex", alignItems: "center", justifyContent: "center", lineHeight: 1, minHeight: 38 }}>UNDO</button>
          </div>

          {/* PLAYERS section */}
          <div style={{ paddingBottom: 20, borderBottom: `1px solid ${BRAND.border}`, display: "flex", flexDirection: "column", gap: 12 }}>
            <div style={{ fontSize: 16, color: BRAND.textMuted, letterSpacing: 2, fontFamily: FH }}>PLAYERS</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {allPlayers.map(p => {
              const isAI = AI_IDS.has(p.id);
              return (
                <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ position: "relative" }}>
                    <Sigil seed={hSeed(p.id)} size={26} />
                    <div style={{ position: "absolute", bottom: -1, right: -1, width: 8, height: 8, borderRadius: "50%", background: "#4CD964", border: "2px solid #000" }} />
                  </div>
                  <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
                    {isAI ? <AIIcon size={13} /> : <HumanIcon size={13} />}
                    <span style={{ fontSize: 16, color: p.id === myId ? BRAND.yellow : "#fff", fontFamily: FB }}>
                      {p.name}{p.id === hostId && <span style={{ fontSize: 16, color: "#fff", marginLeft: 4 }}>(Host)</span>}
                    </span>
                  </span>
                </div>
              );
            })}
            </div>
          </div>

          {/* F1R3 SIGNALS — bottom of right sidebar */}
          <div>
            <div style={{ fontSize: 16, color: "#fff", letterSpacing: 3, fontFamily: FH, marginBottom: 12, fontWeight: 600 }}>F1R3 SIGNALS</div>
            <div style={{ fontSize: 16, color: BRAND.sky, fontFamily: FB, marginBottom: 10, lineHeight: 1.4 }}>Not a &quot;like&quot; button</div>
            <div style={{ fontSize: 16, color: BRAND.textSecondary, fontFamily: FB, marginBottom: 10, lineHeight: 1.4 }}>How does this F1R3PIX make you feel?</div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "10px 6px", justifyItems: "center" }}>
              {[BRAND.yellow, BRAND.sage, BRAND.sky, "#7b0429", "#5c0269", "#009188", "#0c8e23", "#1114ad", "#FFFFFF", "#3f3f3f"].map(c => (
                <div key={`sig-r-${c}`} style={{ width: 24, height: 24, borderRadius: "50%", background: c, cursor: "pointer",
                  border: signal === c ? "2px solid #fff" : `1px solid ${BRAND.border}`,
                  transition: "transform 0.15s, box-shadow 0.15s", transform: signal === c ? "scale(1.3)" : "scale(1)" }}
                onClick={() => { setSignal(c); setSignalConfirm(true); setTimeout(() => setSignalConfirm(false), 2500); }}
                onMouseEnter={e => { if (signal !== c) { e.target.style.transform = "scale(1.3)"; e.target.style.boxShadow = `0 0 10px ${c}66`; }}}
                onMouseLeave={e => { if (signal !== c) { e.target.style.transform = "scale(1)"; e.target.style.boxShadow = "none"; }}} />
              ))}
            </div>
            {signalConfirm && <div style={{ marginTop: 8, padding: "6px 8px", borderRadius: 4, background: "rgba(243,214,48,0.08)", border: `1px solid ${BRAND.yellow}33`, fontSize: 16, color: BRAND.yellow, fontFamily: FB }}>noted. we wrote that down.</div>}
            {signal && !signalConfirm && <div style={{ marginTop: 8, fontSize: 16, color: BRAND.textDim, fontFamily: FB, display: "flex", alignItems: "center", gap: 6 }}>{myName}'s signal: <div style={{ width: 12, height: 12, borderRadius: "50%", background: signal, border: `1px solid ${BRAND.border}` }} /></div>}
            <div style={{ marginTop: 8, fontSize: 16, color: BRAND.textSecondary, fontFamily: FB }}>powered by F1R3INK</div>
          </div>
        </div>
      </div>
      <BuiltOnBadge />
      {showTour && <TourOverlay onClose={() => setShowTour(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(F1R3Pix));
</script>
</body>
</html>
